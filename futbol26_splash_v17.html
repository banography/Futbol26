
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
.phone {
  width: 320px; margin: 1rem auto; border-radius: 44px;
  border: 6px solid #222; overflow: hidden; background: #000;
  box-shadow: 0 0 0 1px #444; height: 620px; position: relative;
}
.screen {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
}
.screen-splash { z-index: 3; }
.screen-login  { z-index: 1; }
.swirl-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.login-content {
  position: relative; z-index: 4; width: 100%; padding: 0 28px;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; transition: opacity 0.8s ease;
}
.login-content.show { opacity: 1; }
.login-logo-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
.login-sub {
  font-family: 'Syne', sans-serif; font-size: 11px; color: rgba(255,255,255,0.65);
  letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; text-align: center;
}
.color-bar { display: flex; width: 160px; height: 3px; border-radius: 2px; overflow: hidden; margin-top: 12px; }
.color-bar-seg { flex: 1; }
.btns { width: 100%; display: flex; flex-direction: column; gap: 10px; }
.login-btn {
  width: 100%; padding: 14px 20px; border-radius: 14px;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  line-height: 1;
}
.btn-google { background: #fff; color: #1a1a1a; border: none; }
.btn-apple  { background: rgba(0,0,0,0.55); color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
.btn-email  { background: rgba(255,255,255,0.1); color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
</style>

<h2 class="sr-only">Futbol26 splash and login with fixed buttons</h2>

<div class="phone">
  <div class="screen screen-login">
    <canvas id="login-swirl" class="swirl-canvas"></canvas>
    <div class="login-content" id="login-content">
      <div class="login-logo-wrap">
        <canvas id="logo-canvas" width="264" height="50" style="width:264px;height:50px;display:block;margin:0 auto;"></canvas>
        <div class="login-sub">World Cup Tracker</div>
        <div class="color-bar" id="login-bar"></div>
      </div>
      <div class="btns">

        <!-- Google — official G logo as image-equivalent SVG -->
        <button class="login-btn btn-google">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
            <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.1-6.1C34.46 3.19 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.22l7.1 5.52C12.4 13.6 17.73 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.74H24v9h12.7c-.55 2.9-2.2 5.36-4.68 7.02l7.18 5.58C43.3 37.28 46.52 31.34 46.52 24.5z"/>
            <path fill="#FBBC05" d="M10.74 28.26A14.6 14.6 0 0 1 9.5 24c0-1.48.26-2.9.72-4.26l-7.1-5.52A23.94 23.94 0 0 0 0 24c0 3.86.92 7.5 2.54 10.72l8.2-6.46z"/>
            <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.5-4.94l-7.18-5.58c-1.82 1.22-4.14 1.96-6.32 1.96-6.27 0-11.6-4.1-13.26-9.74l-8.2 6.46C7.07 42.52 14.82 47 24 47z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Apple — clean official shape -->
        <button class="login-btn btn-apple">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" width="17" height="20" fill="white">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 411 0 312.3 0 217.4c0-178.4 116.1-272.5 230.4-272.5 59.4 0 112.7 39.5 151.1 39.5 36.7 0 103.7-43.2 174.5-43.2 27.9 0 130.3 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
          </svg>
          Continue with Apple
        </button>

        <!-- Email — simple clean envelope -->
        <button class="login-btn btn-email">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 16" width="20" height="16" fill="none">
            <rect x="1" y="1" width="18" height="14" rx="2.5" stroke="white" stroke-width="1.5"/>
            <polyline points="1,4 10,10 19,4" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          Sign in with email
        </button>

      </div>
    </div>
  </div>
  <div class="screen screen-splash" id="splash">
    <canvas id="splash-canvas" class="swirl-canvas"></canvas>
  </div>
</div>

<script>
const PALETTE = ['#003C1E','#3CF0B4','#96B400','#B4F01E','#9678F0','#3C00B4','#1E1EF0','#F01E00','#B40000','#780000'];

function buildBar(el) {
  el.innerHTML = '';
  PALETTE.forEach(c => { const d = document.createElement('div'); d.className='color-bar-seg'; d.style.background=c; el.appendChild(d); });
}
buildBar(document.getElementById('login-bar'));

function drawLogo(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  const LW = 380, LH = 60;
  const scale = Math.min(W / LW, H / LH);
  const ox = (W - LW * scale) / 2;
  const oy = (H - LH * scale) / 2;
  const x = v => ox + v*scale;
  const y = v => oy + v*scale;
  const s = v => v*scale;
  function r(px,py,pw,ph){ ctx.fillRect(x(px),y(py),s(pw),s(ph)); }

  // F
  r(0,0,6,60); r(0,0,36,9); r(0,26,28,7);
  // U
  r(46,0,4,52); r(82,0,4,52); r(46,52,40,8);
  // T
  r(96,0,42,10); r(114,10,6,50);
  // B even-odd
  ctx.beginPath();
  ctx.moveTo(x(148),y(0)); ctx.lineTo(x(148),y(60)); ctx.lineTo(x(172),y(60));
  ctx.lineTo(x(180),y(54)); ctx.lineTo(x(180),y(40)); ctx.lineTo(x(174),y(34));
  ctx.lineTo(x(180),y(28)); ctx.lineTo(x(180),y(14)); ctx.lineTo(x(172),y(8));
  ctx.lineTo(x(148),y(8)); ctx.closePath();
  ctx.moveTo(x(154),y(12)); ctx.lineTo(x(170),y(12)); ctx.lineTo(x(174),y(16));
  ctx.lineTo(x(174),y(28)); ctx.lineTo(x(170),y(30)); ctx.lineTo(x(154),y(30)); ctx.closePath();
  ctx.moveTo(x(154),y(34)); ctx.lineTo(x(172),y(34)); ctx.lineTo(x(176),y(38));
  ctx.lineTo(x(176),y(52)); ctx.lineTo(x(172),y(56)); ctx.lineTo(x(154),y(56)); ctx.closePath();
  ctx.fill('evenodd');
  // O even-odd
  ctx.beginPath();
  ctx.moveTo(x(202),y(0)); ctx.lineTo(x(220),y(0)); ctx.lineTo(x(232),y(10));
  ctx.lineTo(x(232),y(50)); ctx.lineTo(x(220),y(60)); ctx.lineTo(x(202),y(60));
  ctx.lineTo(x(190),y(50)); ctx.lineTo(x(190),y(10)); ctx.closePath();
  ctx.moveTo(x(204),y(10)); ctx.lineTo(x(218),y(10)); ctx.lineTo(x(224),y(16));
  ctx.lineTo(x(224),y(44)); ctx.lineTo(x(218),y(50)); ctx.lineTo(x(204),y(50));
  ctx.lineTo(x(198),y(44)); ctx.lineTo(x(198),y(16)); ctx.closePath();
  ctx.fill('evenodd');
  // L
  r(240,0,6,52); r(240,52,34,8);
  // 2
  ctx.beginPath();
  ctx.moveTo(x(282),y(0)); ctx.lineTo(x(312),y(0));
  ctx.bezierCurveTo(x(324),y(0),x(328),y(8),x(326),y(18));
  ctx.bezierCurveTo(x(324),y(26),x(314),y(32),x(304),y(38));
  ctx.lineTo(x(282),y(50)); ctx.lineTo(x(282),y(52)); ctx.lineTo(x(328),y(52));
  ctx.lineTo(x(328),y(60)); ctx.lineTo(x(274),y(60)); ctx.lineTo(x(274),y(46));
  ctx.lineTo(x(304),y(32));
  ctx.bezierCurveTo(x(312),y(26),x(318),y(20),x(316),y(12));
  ctx.bezierCurveTo(x(314),y(6),x(308),y(8),x(302),y(8));
  ctx.lineTo(x(282),y(8)); ctx.closePath();
  ctx.fill();
  // 6 even-odd
  ctx.beginPath();
  ctx.moveTo(x(366),y(0)); ctx.lineTo(x(344),y(0)); ctx.lineTo(x(336),y(8));
  ctx.lineTo(x(336),y(52)); ctx.lineTo(x(344),y(60)); ctx.lineTo(x(368),y(60));
  ctx.lineTo(x(376),y(52)); ctx.lineTo(x(376),y(36)); ctx.lineTo(x(368),y(28));
  ctx.lineTo(x(344),y(28)); ctx.lineTo(x(344),y(8)); ctx.lineTo(x(366),y(8)); ctx.closePath();
  ctx.moveTo(x(344),y(36)); ctx.lineTo(x(368),y(36)); ctx.lineTo(x(370),y(38));
  ctx.lineTo(x(370),y(50)); ctx.lineTo(x(368),y(52)); ctx.lineTo(x(344),y(52));
  ctx.lineTo(x(342),y(50)); ctx.lineTo(x(342),y(38)); ctx.closePath();
  ctx.fill('evenodd');
}

const splashCanvas = document.getElementById('splash-canvas');
const loginSwirlCanvas = document.getElementById('login-swirl');
const logoCanvas = document.getElementById('logo-canvas');
splashCanvas.width = loginSwirlCanvas.width = 320;
splashCanvas.height = loginSwirlCanvas.height = 620;
const FINAL_ANGLE = Math.PI * 3.5;

function drawSwirl(canvas, angle, progress) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
  const maxSize = Math.sqrt(W*W + H*H);
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  for (let i = 0; i < PALETTE.length; i++) {
    const t = i/PALETTE.length;
    const ls = maxSize*(1-t*0.72)*progress;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle+(i/PALETTE.length)*Math.PI*2);
    const hw=ls*0.52, hh=ls*0.72, r=Math.max(Math.min(hw,hh)*0.28,0);
    ctx.fillStyle=PALETTE[i];
    ctx.beginPath();
    ctx.moveTo(-hw+r,-hh); ctx.lineTo(hw-r,-hh); ctx.quadraticCurveTo(hw,-hh,hw,-hh+r);
    ctx.lineTo(hw,hh-r); ctx.quadraticCurveTo(hw,hh,hw-r,hh);
    ctx.lineTo(-hw+r,hh); ctx.quadraticCurveTo(-hw,hh,-hw,hh-r);
    ctx.lineTo(-hw,-hh+r); ctx.quadraticCurveTo(-hw,-hh,-hw+r,-hh);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}

drawSwirl(loginSwirlCanvas, FINAL_ANGLE, 1);
drawLogo(logoCanvas);

const PHASE1=3800,PHASE2=4800,PHASE3=5600;
let startTime=null,loginShown=false;
function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function easeOutCubic(t){return 1-Math.pow(1-t,3);}
function animate(ts){
  if(!startTime)startTime=ts;
  const e=ts-startTime;
  if(e<PHASE1){drawSwirl(splashCanvas,easeInOut(e/PHASE1)*FINAL_ANGLE,easeInOut(e/PHASE1));requestAnimationFrame(animate);}
  else if(e<PHASE2){drawSwirl(splashCanvas,FINAL_ANGLE,1);requestAnimationFrame(animate);}
  else if(e<PHASE3){const p=(e-PHASE2)/(PHASE3-PHASE2);document.getElementById('splash').style.opacity=1-easeOutCubic(p);drawSwirl(splashCanvas,FINAL_ANGLE,1);requestAnimationFrame(animate);}
  else{document.getElementById('splash').style.display='none';if(!loginShown){document.getElementById('login-content').classList.add('show');loginShown=true;}}
}
requestAnimationFrame(animate);
</script>
